# Sobe a Trilha inteira (front + back) com um único comando:
#
#   docker compose up --build
#
# Front-end:  http://localhost:8080
# API (opc.): http://localhost:4000/api/health

services:
  backend:
    build: ./server
    environment:
      # Troque o segredo em produção (ou defina JWT_SECRET no ambiente).
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      PORT: 4000
    volumes:
      - trilha-data:/app/data # banco JSON persistente
      - trilha-uploads:/app/uploads # arquivos enviados
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  trilha-data:
  trilha-uploads:
